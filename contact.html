<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>

  <style>
    /* ======================
      GLOBAL STYLES
    =======================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      background: #f7f7f7;
      color: #1e1e1e;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ======================
      SECTION
    =======================*/
    .contact-section {
        max-width: 1200px;
        margin: 120px auto;
        padding: 0 40px;

        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 80px;
        align-items: start;
    }

    .contact-left h2 {
        font-size: 36px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;

        margin-bottom: 60px;
    }

    .contact-left p {
        margin-top: 0;
        max-width: 360px;
        opacity: 0.75;
        line-height: 1.8;
    }

    input,
    textarea {
        width: 100%;

        padding: 16px;

        border: 1px solid rgba(30,30,30,0.15);

        background: transparent;

        font-family: inherit;
        font-size: 14px;

        transition: border-color 0.3s ease;
    }

    input:focus,
    textarea:focus {
        outline: none;

        border-color: rgba(30,30,30,0.4);
    }

    .name-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;

        margin-bottom: 20px;
    }

    button {
        margin-top: 20px;

        padding: 14px 32px;

        border: 1px solid rgba(30,30,30,0.15);

        background: transparent;

        font-family: inherit;
        letter-spacing: 2px;
        text-transform: uppercase;

        cursor: pointer;

        transition: all 0.3s ease;
    }

    button:hover {
        background: #1e1e1e;
        color: #f7f7f7;
    }

    .section h2 {
      font-weight: 300;
      margin-bottom: 20px;
    }

    .contact-info {
      font-size: 16px;
      opacity: 0.9;
    }

    footer {
      padding: 60px;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }

  </style>

</head>

<body>

  <!-- CONTACT -->
<section class="contact-section">

    <div class="contact-left">
        <h2>Contact</h2>

        <p>
            Have a question about my work, an interest in a commission,
            or simply want to connect? I'd be happy to hear from you.
        </p>
    </div>

    <div class="contact-right">

        <form action="https://formspree.io/f/xlgazzqa" method="POST">

            <div class="name-row">
                <input type="text" name="firstName"
                       placeholder="First Name" required>

                <input type="text" name="lastName"
                       placeholder="Last Name" required>
            </div>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <textarea name="message"
                      rows="6"
                      placeholder="Your Message..."
                      required></textarea>

            <button type="submit">Send</button>

        </form>

    </div>

</section>

</body>
</html>

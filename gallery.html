<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>

  <style>
    /* ======================
      GLOBAL STYLES
    =======================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      background: #f7f7f7;
      color: #1e1e1e;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ======================
      GALLERY
    =======================*/
    .gallery {
      padding: 120px 40px;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;

      max-width: 1200px;
      margin: 0 auto;
    }

    .art {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .art img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .art img:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }

    .art.show {
      opacity: 1;
      transform: translateY(0);
    }

    .caption {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.6;
    }

    /* ======================
    COLLECTION STATS
    ======================*/

    .collection-stats {
    max-width: 1200px;
    margin: 40px auto 80px auto;
    padding: 0 40px;

    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 30px;
    flex-wrap: wrap;
    }

    .stat {
    flex: 1;
    min-width: 120px;
    text-align: center;
    }

    .stat-label {
    display: block;

    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;

    opacity: 0.55;

    margin-bottom: 10px;
    }

    .stat-number {
    display: block;

    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    }

    .collection-overview {
        max-width: 1200px;
        margin: 80px auto 60px auto;
        padding: 0 40px;
    }

    .collection-title {
        display: block;
        width: 100%;

        font-size: 36px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;

        opacity: 0.75;

        margin-bottom: 40px;

        text-align: center;
    }

    .filter-menu {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;

        margin: 50px auto;
    }

    .filter-label {
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 300;
        opacity: 0.75;
        margin: 0;
    }

    #category-filter {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;

        background: transparent;

        border: 1px solid rgba(30, 30, 30, 0.15);
        border-radius: 999px;

        padding: 12px 48px 12px 24px;

        font-family: inherit;
        font-size: 14px;
        letter-spacing: 1px;

        color: #1e1e1e;

        cursor: pointer;

        transition:
            border-color 0.3s ease,
            transform 0.2s ease;
    }

    #category-filter:hover {
        border-color: rgba(30, 30, 30, 0.35);
    }

    #category-filter:focus {
        outline: none;
        border-color: rgba(30, 30, 30, 0.5);
        transform: translateY(-1px);
    }

  </style>
</head>

<body>

    <!-- COLLECTION OVERVIEW -->

    <section class="collection-overview">

        <h2 class="collection-title">My Collection</h2>

        <div class="collection-stats">

            <div class="stat">
                <span class="stat-label">Total Art Pieces</span>
                <span class="stat-number">10</span>
            </div>

            <div class="stat">
                <span class="stat-label">Sculptures</span>
                <span class="stat-number">1</span>
            </div>

            <div class="stat">
                <span class="stat-label">Paintings</span>
                <span class="stat-number">8</span>
            </div>

            <div class="stat">
                <span class="stat-label">Photographs</span>
                <span class="stat-number">0</span>
            </div>

            <div class="stat">
                <span class="stat-label">Works on Paper</span>
                <span class="stat-number">1</span>
            </div>

        </div>

    </section>

  <!-- GALLERY FILTER BAR -->

    <div class="gallery-controls">

        <div class="filter-menu">

            <label for="category-filter" class="filter-label">
                Filter By:
            </label>

            <select id="category-filter">
                <option value="all">All Works</option>
                <option value="painting">Paintings</option>
                <option value="sculpture">Sculptures</option>
                <option value="photograph">Photographs</option>
                <option value="paper">Works on Paper</option>
            </select>

        </div>

    </div>

  <!-- GALLERY -->
  <section class="gallery">

    <div class="art" data-category="painting"><img src="Photos/providence.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/dog_and_sandwich.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/frozen.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/topolino.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/gameboy.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/sunset.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/vase.jpg" /></div>
    <div class="art" data-category="painting"><img src="Photos/heartbreak.jpg" /></div>
    <div class="art" data-category="sculpture"><img src="Photos/bull_skull.jpg" /></div>
    <div class="art" data-category="paper"><img src="Photos/black_stencil.jpg" /></div>

  </section>

  <!-- SCRIPT -->
  <script>
    const arts = document.querySelectorAll('.art');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.2 });

    arts.forEach(art => observer.observe(art));

    const filter = document.getElementById('category-filter');
    const artworks = document.querySelectorAll('.art');

    filter.addEventListener('change', () => {
        const selected = filter.value;

        artworks.forEach(art => {

            const category = art.dataset.category;

            if (selected === 'all' || category === selected) {
                art.style.display = '';
            } else {
                art.style.display = 'none';
            }

        });
    });
    
  </script>

</body>
</html>

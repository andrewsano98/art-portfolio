<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Portfolio</title>

  <style>
    /* ======================
      GLOBAL STYLES
    =======================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      background: #f7f7f7;
      color: #1e1e1e;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ======================
      NAV
    =======================*/
    
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px 40px;
      font-size: 14px;
      letter-spacing: 1px;
      z-index: 100;
    }

    nav .links {
      display: flex;
      gap: 24px;
    }

    nav .links a:hover {
      opacity: 1;
    }

    /* ======================
      HERO
    =======================*/
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
      position: relative;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .hero p {
      margin-top: 15px;
      opacity: 0.6;
      font-size: 16px;
    }

    /* ======================
      SIGNATURE
    =======================*/

    .signature-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .signature {
      width: 300px;
      height: auto;
      opacity: 0.9;
    }



  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="links">
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-top">
      <div class="signature-container">
        <img src="Photos/signature.png"
            alt="Andrew Sano Signature"
            class="signature">
      </div>
    </div>
  </section>

</body>
</html>

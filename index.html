<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Portfolio</title>

  <style>
    /* ======================
       GLOBAL STYLES
    =======================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
      background: #f7f7f7;
      color: #1e1e1e;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ======================
       NAV
    =======================*/
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      font-size: 14px;
      letter-spacing: 1px;
      background: rgba(247,247,247,0.7);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    nav .links a {
      margin-left: 20px;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    nav .links a:hover {
      opacity: 1;
    }

    /* ======================
       HERO
    =======================*/
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .hero p {
      margin-top: 15px;
      opacity: 0.6;
      font-size: 16px;
    }

    .hero button {
      margin-top: 40px;
      padding: 10px 20px;
      border: 1px solid #1e1e1e;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s;
    }

    .hero button:hover {
      background: #1e1e1e;
      color: white;
    }

    /* ======================
       GALLERY
    =======================*/
    .gallery {
      padding: 120px 40px;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;

      max-width: 1200px;
      margin: 0 auto;
    }

    .art {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .art img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .art img:hover {
      transform: scale(1.02);
      opacity: 0.9;
}

    .art.show {
      opacity: 1;
      transform: translateY(0);
    }

    .caption {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.6;
    }

    /* ======================
       ABOUT / CONTACT
    =======================*/
    .section {
      padding: 120px 40px;
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .section h2 {
      font-weight: 300;
      margin-bottom: 20px;
    }

    footer {
      padding: 60px;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">ANDREW</div>
    <div class="links">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Art Portfolio</h1>
    <p>Paintings, Sculptures, Drawings, & More.</p>
    <button onclick="document.getElementById('work').scrollIntoView({behavior:'smooth'})">Enter</button>
  </section>

  <!-- GALLERY -->
  <section class="gallery" id="work">

    <div class="art">
      <img src="Photos/providence.jpg" />
    </div>

    <div class="art">
      <img src="Photos/dog_and_sandwich.jpg" />
    </div>

    <div class="art">
      <img src="Photos/frozen.jpg" />
    </div>

    <div class="art">
      <img src="Photos/topolino.jpg" />
    </div>

        <div class="art">
      <img src="Photos/gameboy.jpg" />
    </div>

    <div class="art">
      <img src="Photos/sunset.jpg" />
    </div>

    <div class="art">
      <img src="Photos/vase.jpg" />
    </div>

    <div class="art">
      <img src="Photos/heartbreak.jpg" />
    </div>

    <div class="art">
      <img src="Photos/bull_skull.jpg" />
    </div>

    <div class="art">
      <img src="Photos/black_stencil.jpg" />
    </div>

  </section>

  <!-- ABOUT -->
  <section class="section" id="about">
    <h2>About</h2>
    <p>
      A short statement about your work, philosophy, or creative direction.
      Keep it minimal—let the images speak first.
    </p>
  </section>

  <!-- CONTACT -->
  <section class="section" id="contact">
    <h2>Contact</h2>
    <p>andrewsano98@outlook.com</p>
  </section>

  <footer>
    © 2026 Andrew Sano
  </footer>

  <script>
    // Scroll reveal animation
    const arts = document.querySelectorAll('.art');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.2 });

    arts.forEach(art => observer.observe(art));
  </script>

</body>
</html>
